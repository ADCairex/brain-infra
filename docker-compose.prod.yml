services:

  # ─── Traefik ──────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - internal

  # ─── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: brain
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Auth service ─────────────────────────────────────────────────────────────
  brain-auth-service:
    image: ghcr.io/adcairex/brain-auth-service:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://brain:${POSTGRES_PASSWORD}@postgres:5432/brain?options=-csearch_path%3Dauth
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─── Finance service ──────────────────────────────────────────────────────────
  brain-finance-service:
    image: ghcr.io/adcairex/brain-finance-service:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://brain:${POSTGRES_PASSWORD}@postgres:5432/brain
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─── API Gateway ──────────────────────────────────────────────────────────────
  brain-api-gateway:
    image: ghcr.io/adcairex/brain-api-gateway:latest
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      SERVICE_AUTH_URL: http://brain-auth-service:8001
      SERVICE_FINANCE_URL: http://brain-finance-service:8002
      ALLOWED_ORIGINS: https://cairex-brain.com
      ENVIRONMENT: production
    depends_on:
      - brain-auth-service
      - brain-finance-service
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.cairex-brain.com`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "com.centurylinklabs.watchtower.enable=true"

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  brain-frontend:
    image: ghcr.io/adcairex/brain-frontend:latest
    restart: unless-stopped
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`cairex-brain.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "com.centurylinklabs.watchtower.enable=true"

  # ─── Watchtower ───────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_LABEL_ENABLE: true
      WATCHTOWER_CLEANUP: true
      REPO_USER: adcairex
      REPO_PASS: ${GHCR_TOKEN}
      DOCKER_API_VERSION: "1.41"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  letsencrypt:
