services:

  # ─── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: brain
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Auth service ─────────────────────────────────────────────────────────────
  brain-auth-service:
    image: ghcr.io/adcairex/brain-auth-service:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://brain:${POSTGRES_PASSWORD}@postgres:5432/brain?options=-csearch_path%3Dauth
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─── Finance service ──────────────────────────────────────────────────────────
  brain-finance-service:
    image: ghcr.io/adcairex/brain-finance-service:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://brain:${POSTGRES_PASSWORD}@postgres:5432/brain
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─── API Gateway ──────────────────────────────────────────────────────────────
  brain-api-gateway:
    image: ghcr.io/adcairex/brain-api-gateway:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      SERVICE_AUTH_URL: http://brain-auth-service:8001
      SERVICE_FINANCE_URL: http://brain-finance-service:8002
      ALLOWED_ORIGINS: http://135.125.53.95:3000
      ENVIRONMENT: production
    depends_on:
      - brain-auth-service
      - brain-finance-service
    networks:
      - internal
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  brain-frontend:
    image: ghcr.io/adcairex/brain-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - internal
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─── Watchtower ───────────────────────────────────────────────────────────────
  # Comprueba cada 5 minutos si hay imágenes nuevas en GHCR
  # Solo actualiza contenedores con la label watchtower.enable=true
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_LABEL_ENABLE: true
      WATCHTOWER_CLEANUP: true
      REPO_USER: adcairex
      REPO_PASS: ${GHCR_TOKEN}
      DOCKER_API_VERSION: "1.41"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
